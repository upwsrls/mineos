# mineOS - fix boot "nvidia-gpu i2c timeout" / "ucsi_ccg init failed -110"
#
# Molte GPU NVIDIA da mining espongono una funzione aux USB-C (PCIe .3) senza
# controller I2C reale. Il kernel carica i2c_nvidia_gpu e ucsi_ccg, che falliscono
# con timeout (-110) su ogni GPU. Non influisce su CUDA/mining ma sporca tty1 e
# ritarda l'avvio. Blacklist innocua: USB-C/PD non serve su un rig headless.

blacklist i2c_nvidia_gpu
blacklist ucsi_ccg
install i2c_nvidia_gpu /bin/false
install ucsi_ccg /bin/false
